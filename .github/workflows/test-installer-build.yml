name: Test Installer Build (No Sign)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - dev
    paths:
      - "Installer/**"
  pull_request:
    paths:
      - "Installer/**"

jobs:
  build-installer-no-sign:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Inno Setup
        run: |
          # Check if Inno Setup is already installed by looking for ISCC.exe
          $regPaths = @(
            'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\Inno Setup 6_is1',
            'HKLM:\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\Inno Setup 6_is1'
          )
          $isccPath = $null
          foreach ($rp in $regPaths) {
            if (Test-Path $rp) {
              $installDir = (Get-ItemProperty $rp).InstallLocation
              if ($installDir -and (Test-Path (Join-Path $installDir 'ISCC.exe'))) {
                $isccPath = Join-Path $installDir 'ISCC.exe'
                break
              }
            }
          }

          if ($isccPath) {
            Write-Host "Inno Setup is already installed at: $isccPath"
          } else {
            Write-Host "Inno Setup not found — installing via winget ..."
            winget install --id=JRSoftware.InnoSetup --exact --source winget --scope machine --accept-package-agreements --accept-source-agreements
            if ($LASTEXITCODE -ne 0) {
              throw "winget install failed with exit code $LASTEXITCODE"
            }
            Write-Host "Inno Setup installed successfully."
          }
        shell: pwsh

      - name: Detect .NET SDK version
        id: framework
        shell: pwsh
        run: |
          Write-Host "Reading target framework from SoundSwitch/SoundSwitch.csproj..."
          [xml]$project = Get-Content "SoundSwitch/SoundSwitch.csproj"
          $framework = $project.Project.PropertyGroup.TargetFramework | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($framework)) {
            throw "Unable to determine TargetFramework from SoundSwitch/SoundSwitch.csproj"
          }
          Write-Host "Detected target framework value: $framework"
          $match = [System.Text.RegularExpressions.Regex]::Match($framework, '^net(?<major>\d+)\.(?<minor>\d+)')
          if (-not $match.Success) {
            throw "Unable to derive .NET SDK version from TargetFramework '$framework'"
          }
          $dotnetVersion = "{0}.{1}.x" -f $match.Groups['major'].Value, $match.Groups['minor'].Value
          Write-Host "Detected .NET SDK version: $dotnetVersion (from $framework)"
          $major = $match.Groups['major'].Value
          "major=$major" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "dotnet-version=$dotnetVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.framework.outputs.dotnet-version }}
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Log .NET SDK details
        shell: pwsh
        run: |
          Write-Host "Requested SDK channel: ${{ steps.framework.outputs.dotnet-version }}"
          Write-Host "dotnet --version:"
          dotnet --version
          Write-Host "dotnet --list-sdks:"
          dotnet --list-sdks
          Write-Host "dotnet --info:"
          dotnet --info

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install markdown dependency
        shell: pwsh
        run: |
          python -m pip install --upgrade pip --quiet
          if ($LASTEXITCODE -ne 0) { throw "Failed to upgrade pip (exit code $LASTEXITCODE)." }
          python -m pip install markdown --quiet
          if ($LASTEXITCODE -ne 0) { throw "Failed to install Python 'markdown' package (exit code $LASTEXITCODE)." }

      - name: Build installer assets and installer
        shell: pwsh
        run: |
          .\tools\Publish-Release.ps1 -BuildFromSource -Configuration Release -SkipSigning -InstallerReleaseState Nightly -DotNetMajorVersion ${{ steps.framework.outputs.major }}

      - name: Run Installer in Silent Mode (Machine Scope)
        run: |
          set "INSTALL_LOG=%TEMP%\SoundSwitch-Installer-Test.log"
          if exist "%INSTALL_LOG%" del /f /q "%INSTALL_LOG%"

          echo "Finding installer executable..."
          for /f "delims=" %%i in ('dir /b Final\Installer\*.exe') do set INSTALLER_NAME=%%i
          if not defined INSTALLER_NAME (
            echo "ERROR: No installer found in Final\Installer\"
            exit /b 1
          )
          echo "Found installer: %INSTALLER_NAME%"
          echo "Installer log path: %INSTALL_LOG%"
          
          echo "Running installer in full silent mode for machine scope..."
          Final\Installer\%INSTALLER_NAME% /VERYSILENT /ALLUSERS /NORESTART /SUPPRESSMSGBOXES /LOG="%INSTALL_LOG%"
          
          echo "Installation completed. Exit code: %ERRORLEVEL%"
          if %ERRORLEVEL% neq 0 (
            echo "Installation failed with exit code %ERRORLEVEL%"
            if exist "%INSTALL_LOG%" (
              echo "Installation log:"
              type "%INSTALL_LOG%"
            )
            exit /b %ERRORLEVEL%
          )
          
          if exist "%INSTALL_LOG%" copy /y "%INSTALL_LOG%" "Final\Installer\install.log" >nul
          echo "Installation successful!"
        shell: cmd

      - name: Upload installer and logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-installer-build-assets
          path: |
            Final/Installer/*.exe
            Final/Installer/install.log
          if-no-files-found: warn
