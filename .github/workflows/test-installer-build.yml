name: Test Installer Build (No Sign)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - dev
    paths:
      - "Installer/**"
  pull_request:
    paths:
      - "Installer/**"

jobs:
  build-installer-no-sign:
    runs-on: windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Inno Setup
        run: |
          $result = winget install --id=JRSoftware.InnoSetup --exact --source winget --scope machine --accept-package-agreements --accept-source-agreements 2>&1
          # winget returns exit code 0 on success, but also returns non-zero when
          # the package is already installed with no upgrade available.  Treat that
          # as success so CI doesn't fail on pre-installed runners.
          # Exit code -1978335135 (0x8A150061) = APPINSTALLER_CLI_ERROR_UPDATE_NOT_APPLICABLE
          if ($LASTEXITCODE -ne 0) {
            $output = $result | Out-String
            if ($output -match 'No available upgrade found|already installed' -or $LASTEXITCODE -eq -1978335135) {
              Write-Host "Inno Setup is already installed — continuing."
            } else {
              throw "winget install failed (exit code $LASTEXITCODE): $output"
            }
          }
        shell: pwsh

      - name: Detect .NET SDK version
        id: framework
        shell: pwsh
        run: |
          [xml]$project = Get-Content "SoundSwitch/SoundSwitch.csproj"
          $framework = $project.Project.PropertyGroup.TargetFramework | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($framework)) {
            throw "Unable to determine TargetFramework from SoundSwitch/SoundSwitch.csproj"
          }
          $match = [System.Text.RegularExpressions.Regex]::Match($framework, '^net(?<major>\d+)\.(?<minor>\d+)')
          if (-not $match.Success) {
            throw "Unable to derive .NET SDK version from TargetFramework '$framework'"
          }
          $dotnetVersion = "{0}.{1}.x" -f $match.Groups['major'].Value, $match.Groups['minor'].Value
          Write-Host "Detected .NET SDK version: $dotnetVersion (from $framework)"
          "dotnet-version=$dotnetVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ steps.framework.outputs.dotnet-version }}
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Build SoundSwitch Application
        run: |
          echo "Cleaning build directories"
          if exist bin rmdir /q /s bin
          if exist obj rmdir /q /s obj
          if exist Release rmdir /q /s Release
          if exist Final rmdir /q /s Final
          mkdir Final
          
          echo "Building SoundSwitch CLI"
          dotnet publish -c Release SoundSwitch.CLI\SoundSwitch.CLI.csproj -o Final
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

          echo "Building SoundSwitch Main Application"
          dotnet publish -c Release SoundSwitch\SoundSwitch.csproj -o Final
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
        shell: cmd

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Prepare Installer Assets
        run: |
          python -m pip install --upgrade pip --quiet
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          python -m pip install markdown --quiet
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

          echo "Generate Changelog"
          python tools\markdown_to_html.py CHANGELOG.md -o Final\Changelog.html
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

          echo "Generate Terms"
          python tools\markdown_to_html.py Terms.md -o Final\Terms.html
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

          echo "Generate README"
          python tools\markdown_to_html.py README.md -o Final\Readme.html
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%

          if exist README.de.md (
            python tools\markdown_to_html.py README.de.md -o Final\Readme.de.html
            if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          )

          echo "Copy soundSwitched image"
          xcopy /y img\soundSwitched.png Final >nul 2>nul

          echo "Copy CLI README"
          xcopy /y SoundSwitch.CLI\README.md Final >nul 2>nul

          echo "Copy LICENSE"
          xcopy /y LICENSE.txt Final >nul 2>nul
          xcopy /y Terms.txt Final >nul 2>nul
        shell: cmd

      - name: Build Installer
        run: .\\Installer\\Make-Installer.bat Nightly
        shell: cmd

      - name: Run Installer in Silent Mode (Machine Scope)
        run: |
          echo "Finding installer executable..."
          for /f "delims=" %%i in ('dir /b Final\Installer\*.exe') do set INSTALLER_NAME=%%i
          if not defined INSTALLER_NAME (
            echo "ERROR: No installer found in Final\Installer\"
            exit /b 1
          )
          echo "Found installer: %INSTALLER_NAME%"
          
          echo "Running installer in full silent mode for machine scope..."
          Final\Installer\%INSTALLER_NAME% /VERYSILENT /ALLUSERS /NORESTART /SUPPRESSMSGBOXES /LOG="Final\Installer\install.log"
          
          echo "Installation completed. Exit code: %ERRORLEVEL%"
          if %ERRORLEVEL% neq 0 (
            echo "Installation failed with exit code %ERRORLEVEL%"
            if exist "Final\Installer\install.log" (
              echo "Installation log:"
              type "Final\Installer\install.log"
            )
            exit /b %ERRORLEVEL%
          )
          
          echo "Installation successful!"
        shell: cmd
