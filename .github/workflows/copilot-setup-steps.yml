name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Detect .NET SDK version
              id: framework
              run: |
                  framework=$(grep -oP '(?<=<TargetFramework>)[^<]+' SoundSwitch/SoundSwitch.csproj | head -1)
                  if [ -z "$framework" ]; then
                    echo "Unable to determine TargetFramework from SoundSwitch/SoundSwitch.csproj"
                    exit 1
                  fi

                  major=$(echo "$framework" | grep -oP '(?<=^net)\d+')
                  minor=$(echo "$framework" | grep -oP '(?<=^net\d{1,3}\.)\d+')
                  if [ -z "$major" ] || [ -z "$minor" ]; then
                    echo "Unable to derive .NET SDK version from TargetFramework '$framework'"
                    exit 1
                  fi

                  dotnet_version="${major}.${minor}.x"
                  echo "Detected .NET SDK version: $dotnet_version (from $framework)"
                  echo "dotnet-version=$dotnet_version" >> "$GITHUB_OUTPUT"

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: ${{ steps.framework.outputs.dotnet-version }}
                  cache: true
                  cache-dependency-path: Directory.Packages.props

            - name: Restore dependencies
              run: dotnet restore

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install Python markdown library
              run: python -m pip install markdown --quiet
